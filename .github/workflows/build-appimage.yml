name: Build AppImage

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Least privilege by default; only the release job opts into write.
permissions:
  contents: read

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Run tests
        run: dotnet test

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x scripts/build-appimage.sh scripts/setup-deps.sh packaging/LorerimAutoinstall.AppDir/AppRun
          scripts/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LorerimAutoinstall-x86_64
          path: LorerimAutoinstall-x86_64.AppImage
          compression-level: 0

  # Separate job so write permission is granted only for tag builds that publish a release.
  release:
    needs: appimage
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: LorerimAutoinstall-x86_64

      - name: Extract changelog for this tag
        id: changelog
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Pull the section between this version's heading and the next "## " heading.
          notes="$(awk -v tag="## $tag" '
            $0 == tag {grab=1; next}
            grab && /^## / {exit}
            grab {print}
          ' CHANGELOG.md)"
          if [[ -z "${notes//[[:space:]]/}" ]]; then
            echo "No CHANGELOG.md section for $tag; falling back to auto-generated notes." >&2
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          else
            {
              echo "notes<<EOF"
              echo "$notes"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: LorerimAutoinstall-x86_64.AppImage
          body: ${{ steps.changelog.outputs.have_notes == 'true' && steps.changelog.outputs.notes || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.have_notes != 'true' }}
